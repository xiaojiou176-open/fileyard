name: reusable-build-runtime-image

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
      image-tag-prefix:
        required: true
        type: string
      python-base-image:
        required: false
        type: string
        default: mcr.microsoft.com/devcontainers/python:1-3.11-bullseye@sha256:ae5708357f39cf7fd7d8b8ac856dffa3525fbabd008e30e7562749b2cef619d5
      node-runtime-image:
        required: false
        type: string
        default: node:24.8.0-bullseye@sha256:1f01014be94e1bbd6687191b5e33e376b8bb1a48abf9c42560a26c812587fdfb
    outputs:
      image-ref:
        description: Built runtime image digest reference.
        value: ${{ jobs.build-runtime-image.outputs.image-ref }}
      image-digest:
        description: Built runtime image digest value.
        value: ${{ jobs.build-runtime-image.outputs.image-digest }}
    secrets:
      GHCR_PUSH_TOKEN:
        required: false

permissions:
  contents: read
  packages: read

jobs:
  build-runtime-image:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      image-ref: ${{ steps.build.outputs.image-ref }}
      image-digest: ${{ steps.build.outputs.image-digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          clean: false
          persist-credentials: false
      - name: Login to GHCR
        env:
          GHCR_PUSH_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN }}
          GHCR_PUSH_USERNAME: ${{ vars.GHCR_PUSH_USERNAME || github.repository_owner }}
        run: |
          set -euo pipefail
          if [ -z "${GHCR_PUSH_TOKEN:-}" ]; then
            echo "❌ reusable-build-runtime-image: missing required secret GHCR_PUSH_TOKEN" >&2
            exit 1
          fi
          DOCKER_CONFIG_DIR="${RUNNER_TEMP:-${TMPDIR:-/tmp}}/fileyard-docker-config"
          mkdir -p "$DOCKER_CONFIG_DIR"
          printf '%s\n' '{"auths":{}}' > "$DOCKER_CONFIG_DIR/config.json"
          export DOCKER_CONFIG="$DOCKER_CONFIG_DIR"
          echo "DOCKER_CONFIG=$DOCKER_CONFIG_DIR" >> "$GITHUB_ENV"
          printf '%s' "$GHCR_PUSH_TOKEN" | docker login ghcr.io -u "$GHCR_PUSH_USERNAME" --password-stdin # pragma: allowlist secret
      - id: build
        name: Build and publish runtime image
        env:
          GHCR_PUSH_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN }}
          IMAGE_TAG_PREFIX: ${{ inputs.image-tag-prefix }}
          PYTHON_BASE_IMAGE: ${{ inputs.python-base-image }}
          NODE_RUNTIME_IMAGE: ${{ inputs.node-runtime-image }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          CONTRACT_DIR=".runtime-cache/ci-contract"
          IMAGE_REF="ghcr.io/${REPOSITORY_OWNER}/fileyard-ci:${IMAGE_TAG_PREFIX}-${GITHUB_SHA}-py311"
          mkdir -p "$CONTRACT_DIR"
          docker build \
            --file .devcontainer/Dockerfile \
            --build-arg "DEVCONTAINER_BASE_IMAGE=${PYTHON_BASE_IMAGE}" \
            --build-arg "NODE_RUNTIME_IMAGE=${NODE_RUNTIME_IMAGE}" \
            --tag "$IMAGE_REF" .
          push_image() {
            local image_ref="$1"
            docker push "$image_ref"
          }
          wait_for_registry_ref() {
            local image_ref="$1"
            local attempts=12
            local attempt=1
            while [ "$attempt" -le "$attempts" ]; do
              if docker manifest inspect "$image_ref" >/dev/null 2>&1; then
                return 0
              fi
              echo "waiting for registry visibility (${attempt}/${attempts}): $image_ref" >&2
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "❌ runtime image did not become visible in GHCR: $image_ref" >&2
            return 1
          }
          push_image "$IMAGE_REF"
          DIGEST_REF="$(docker image inspect "$IMAGE_REF" --format '{{index .RepoDigests 0}}')"
          wait_for_registry_ref "$DIGEST_REF"
          printf '%s\n' "$IMAGE_REF" > "$CONTRACT_DIR/py311.image.tag.txt"
          printf '%s\n' "$DIGEST_REF" > "$CONTRACT_DIR/py311.image.txt"
          echo "image-ref=$DIGEST_REF" >> "$GITHUB_OUTPUT"
          echo "image-digest=${DIGEST_REF##*@}" >> "$GITHUB_OUTPUT"
      - id: provenance-eligibility
        name: Resolve provenance eligibility
        run: |
          set -euo pipefail
          mkdir -p .runtime-cache/attestations
          if [ "${{ github.event.repository.private }}" = "true" ] && [ "${{ vars.CI_ENABLE_PRIVATE_ATTESTATIONS }}" != "1" ]; then
            printf '%s\n' '{"status":"skipped","reason":"private-repo-attestation-disabled","hint":"set CI_ENABLE_PRIVATE_ATTESTATIONS=1 after enabling GitHub artifact attestations for private repos"}' > .runtime-cache/attestations/provenance-summary.json
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - name: Generate image build provenance
        if: steps.provenance-eligibility.outputs.enabled == 'true'
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/fileyard-ci
          subject-digest: ${{ steps.build.outputs.image-digest }}
      - name: Collect provenance artifact pointers
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .runtime-cache/attestations
          summary_file=".runtime-cache/attestations/provenance-summary.json"
          if [ ! -f "$summary_file" ]; then
            cat >"$summary_file" <<EOF
          {
            "status": "generated",
            "subject_name": "ghcr.io/${{ github.repository_owner }}/fileyard-ci",
            "subject_digest": "${{ steps.build.outputs.image-digest }}",
            "image_ref": "${{ steps.build.outputs.image-ref }}",
            "verify_hint": "gh attestation verify oci://ghcr.io/${{ github.repository_owner }}/fileyard-ci@${{ steps.build.outputs.image-digest }} --repo ${{ github.repository }}"
          }
          EOF
          fi
          if [ -f "${RUNNER_TEMP}/created_attestation_paths.txt" ]; then
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              cp "$path" ".runtime-cache/attestations/$(basename "$path")"
            done < "${RUNNER_TEMP}/created_attestation_paths.txt"
          fi
      - name: Upload CI runtime image contract
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ inputs.artifact-name }}
          path: .runtime-cache/ci-contract/
          if-no-files-found: error
          overwrite: true
      - name: Upload runtime provenance artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ inputs.artifact-name }}-provenance
          path: .runtime-cache/attestations/
          if-no-files-found: error
          overwrite: true
