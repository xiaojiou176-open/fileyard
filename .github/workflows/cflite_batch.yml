name: cflite-batch

on:
  schedule:
    - cron: "20 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cflite-batch-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  run-fuzzers:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          clean: true
          persist-credentials: false
      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          language: python
          sanitizer: address
      - name: Run batch fuzzing
        uses: google/clusterfuzzlite/actions/run_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          language: python
          sanitizer: address
          mode: batch
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
