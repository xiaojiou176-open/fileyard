name: codeql

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "35 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  analyze:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          clean: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          languages: python,javascript
          build-mode: none
      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc
