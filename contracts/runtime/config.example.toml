[global]
log_level = "INFO"
log_json = false
run_id = ""
generator_version = ""
active_strategy_pack_id = ""

[analyze]
input = "<workspace-root>/data/raw"
manifest = "<workspace-root>/.fileman/manifests/manifest.jsonl"
csv = "<workspace-root>/.fileman/artifacts/csv/manifest.csv"
report = "<workspace-root>/.fileman/artifacts/report/report_summary.json"
model = ""
categories = ["工作", "旅行", "美食", "收据", "文档", "聊天", "错误", "产品", "风景", "人物", "其他"]
durability = "batch"
fsync_interval = 50
inline_max_mb = 15.0
resize_max_side = 0
max_retries = 3
retry_base_s = 1.0
retry_max_s = 10.0
ai_timeout_s = 60.0
subprocess_timeout_s = 120.0
audio_segment_threshold = 600.0
audio_segment_seconds = 30.0
audio_segment_count = 3
audio_transcript_max_chars = 4000
doc_text_max_chars = 6000
max_file_mb = 1024.0
max_files = 5000
max_total_mb = 10240.0
workers = 1
offline = false
sleep = 0.0
chunk_size = 500

[apply]
manifest = "<workspace-root>/.fileman/manifests/manifest.jsonl"
output = ""
categories = ""
input_root = ""
trust_manifest_input_root = false
manifest_input_root_allowlist = ""
dry_run = false
out_manifest = ""
report = "<workspace-root>/.fileman/artifacts/report/report_summary.json"
rollback_manifest = "<workspace-root>/.fileman/artifacts/rollback/rollback.jsonl"
verify_sha1 = false
durability = "batch"
fsync_interval = 50
dedupe = true
resume = true
retry_errors = false
chunk_size = 500

[rollback]
manifest = "<workspace-root>/.fileman/manifests/manifest.jsonl"
dry_run = false
overwrite = false
allowed_root = "<workspace-root>/data/raw,<workspace-root>/data/organized"

[report]
manifest = "<workspace-root>/.fileman/manifests/manifest.jsonl"
out = "<workspace-root>/.fileman/artifacts/report/report_summary.json"
validate = false
chunk_size = 500
