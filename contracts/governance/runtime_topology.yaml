version: 1
repo_runtime:
  runtime_cache_root: .runtime-cache
  temp_dir: .runtime-cache/tmp
  log_dir: .runtime-cache/logs
  ci_dir: .runtime-cache/ci
  ci_contract_dir: .runtime-cache/ci-contract
  test_dir: .runtime-cache/test
  build_dir: .runtime-cache/build
  codegen_dir: .runtime-cache/codegen
  venv_dir: ~/.cache/fileorganize/venv/default
  mutmut_cache_file: .runtime-cache/test/mutation/.mutmut-cache
  webui_lock_hash_file: .runtime-cache/build/apps/webui/.fileorganize_webui_lock_hash
workspace_runtime:
  workspace_root: ~/.fileorganize/workspaces/default
  input_dir: ~/.fileorganize/workspaces/default/data/raw
  output_dir: ~/.fileorganize/workspaces/default/data/organized
  manifest_root: ~/.fileorganize/workspaces/default/.fileorganize/manifests
  artifact_root: ~/.fileorganize/workspaces/default/.fileorganize/artifacts
  evidence_bundle_path: ~/.fileorganize/workspaces/default/.fileorganize/artifacts/evidence-bundle.json
  run_bundle_root: ~/.fileorganize/workspaces/default/.fileorganize/runs
