  - path: docs/runner_contract.md
    class: maintainer-facing
    required_substrings:
      - "This document explains why the runner contract exists."
      - "GitHub org runner inventory no longer depends on fixed machine names."
      - "The only live source of truth is:"
    forbidden_regex:
      - "[\\u3400-\\u4dbf\\u4e00-\\u9fff\\uf900-\\ufaff\\u3040-\\u30ff]"
  - path: packages/domain/rollback_integrity.py
    class: maintainer-facing
    required_substrings:
