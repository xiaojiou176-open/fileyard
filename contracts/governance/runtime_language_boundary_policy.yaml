version: 1
default_language: en
fail_close: true
notes:
  - This policy governs runtime and maintainer-facing language boundaries.
  - Maintainer-facing diagnostics must stay English-first so failures remain searchable and globally diagnosable.
  - Product-localized semantics may remain localized only when they are part of manifest/output compatibility or user-facing product vocabulary explicitly allowed here.
