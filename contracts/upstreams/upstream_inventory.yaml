version: 1
upstreams:
  - id: python-runtime-lock
    class: python-registry-lock
    role: build
    source: pyproject.toml + tooling/requirements.lock.txt + tooling/requirements-dev.lock.txt
    source_url: https://pypi.org/simple
    pin_kind: version
    pinned_value: hash-locked
    checksum_or_digest: lockfile-hashes
    license: mixed
    owner: repo
    upgrade_cadence: weekly
    verification_suite: quality-gate-full
    rollback_strategy: restore previous lockfiles
    failure_domain: upstream_python
    provenance_required: false
    floating_allowed: false
  - id: node-lock
    class: node-registry-lock
    role: build
    source: package.json + package-lock.json + apps/webui/package.json
    source_url: https://registry.npmjs.org
    pin_kind: version
    pinned_value: npm-lockfile
    checksum_or_digest: package-lock-integrity
    license: mixed
    owner: repo
    upgrade_cadence: weekly
    verification_suite: webui-build-test
    rollback_strategy: restore previous package-lock.json
    failure_domain: upstream_node
    provenance_required: false
    floating_allowed: false
  - id: devcontainer-base-python311
    class: container-base-image
    role: build
    source: .github/workflows/reusable-build-runtime-image.yml
    source_url: mcr.microsoft.com/devcontainers/python
    pin_kind: digest
    pinned_value: mcr.microsoft.com/devcontainers/python:1-3.11-bullseye@sha256:ae5708357f39cf7fd7d8b8ac856dffa3525fbabd008e30e7562749b2cef619d5
    checksum_or_digest: sha256:ae5708357f39cf7fd7d8b8ac856dffa3525fbabd008e30e7562749b2cef619d5
    license: commercial-friendly
    owner: repo
    upgrade_cadence: monthly
    verification_suite: runner-contract + ci-image-build
    rollback_strategy: restore previous pinned digest
    failure_domain: upstream_image
    provenance_required: true
    floating_allowed: false
  - id: node-runtime-image
    class: container-runtime-image
    role: build
    source: .github/workflows/reusable-build-runtime-image.yml
    source_url: docker.io/library/node
    pin_kind: digest
    pinned_value: node:24.8.0-bullseye@sha256:1f01014be94e1bbd6687191b5e33e376b8bb1a48abf9c42560a26c812587fdfb
    checksum_or_digest: sha256:1f01014be94e1bbd6687191b5e33e376b8bb1a48abf9c42560a26c812587fdfb
    license: mixed
    owner: repo
    upgrade_cadence: monthly
    verification_suite: webui-build-test + ci-image-build
    rollback_strategy: restore previous pinned digest
    failure_domain: upstream_image
    provenance_required: true
    floating_allowed: false
  - id: playwright-browser-bundle
    class: browser-binary
    role: test
    source: pyproject.toml + PLAYWRIGHT_BROWSERS_PATH
    source_url: https://playwright.dev
    pin_kind: version
    pinned_value: playwright==1.58.0
    checksum_or_digest: playwright-managed-download
    license: Apache-2.0
    owner: repo
    upgrade_cadence: monthly
    verification_suite: live-integration + e2e
    rollback_strategy: restore previous playwright version
    failure_domain: upstream_browser
    provenance_required: false
    floating_allowed: false
  - id: gemini-sdk
    class: ai-sdk
    role: runtime
    source: pyproject.toml
    source_url: https://pypi.org/project/google-genai
    pin_kind: version
    pinned_value: google-genai==1.65.0
    checksum_or_digest: lockfile-hashes
    license: Apache-2.0
    owner: repo
    upgrade_cadence: weekly
    verification_suite: functional-gate + live-smoke-preflight
    rollback_strategy: restore previous sdk pin
    failure_domain: upstream_python
    provenance_required: false
    floating_allowed: false
  - id: gemini-model-contract
    class: ai-model-provider-contract
    role: model
    source: .env.example + contracts/runtime/env_contract_registry.yaml
    source_url: https://ai.google.dev
    pin_kind: version
    pinned_value: gemini-3-flash-preview
    checksum_or_digest: model-id-pin
    license: provider-contract
    owner: repo
    upgrade_cadence: on-demand
    verification_suite: functional-gate + live-smoke-preflight + gemini-ui-ux-audit
    rollback_strategy: restore previous model id in env contract
    failure_domain: upstream_model
    provenance_required: false
    floating_allowed: false
  - id: gitleaks-release-binary
    class: github-release-download
    role: security
    source: .github/workflows/ci.yml + tooling/scripts/fetch_upstream_artifact.py
    source_url: https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz
    pin_kind: version
    pinned_value: gitleaks@8.24.2
    checksum_or_digest: sha256-required-at-fetch-time
    license: mixed
    owner: repo
    upgrade_cadence: monthly
    verification_suite: secrets-supply-chain-gate
    rollback_strategy: restore previous gitleaks version/checksum pair
    failure_domain: upstream_image
    provenance_required: false
    floating_allowed: false
  - id: ffmpeg-system-binary
    class: system-binary
    role: runtime
    source: packages/infrastructure/audio_processing.py + tooling/runtime/run_analyze.sh + docs/usage.md
    source_url: https://ffmpeg.org
    pin_kind: external-state
    pinned_value: host-managed-installation
    checksum_or_digest: governance-declaration
    license: mixed
    owner: repo
    upgrade_cadence: on-demand
    verification_suite: upstream-governance-system-binary
    rollback_strategy: restore previous ffmpeg installation or allow no-ffmpeg fallback
    failure_domain: ci_environment
    provenance_required: false
    floating_allowed: false
    assurance_tier: host-preflight-optional
    repo_preflight_gate: bash tooling/gates/host_capability_preflight.sh ffmpeg-system-binary
    host_management: operator-managed
    verification_mode: governed-host-binary-declaration
    verification_strategy: detect trusted ffmpeg in PATH before optional audio segmentation
    capability_status: host-managed-optional
    install_hint: install ffmpeg on the host or runner image when audio segmentation is required
    binary_names:
      - ffmpeg
  - id: document-conversion-system-binary
    class: system-binary
    role: runtime
    source: packages/infrastructure/document_conversion.py + tooling/runtime/run_analyze.sh + docs/usage.md
    source_url: https://www.libreoffice.org/download/download-libreoffice/
    pin_kind: external-state
    pinned_value: host-managed-installation
    checksum_or_digest: governance-declaration
    license: mixed
    owner: repo
    upgrade_cadence: on-demand
    verification_suite: upstream-governance-system-binary
    rollback_strategy: restore the previous LibreOffice or unoconv installation, or accept document-conversion failure paths
    failure_domain: ci_environment
    provenance_required: false
    floating_allowed: false
    assurance_tier: host-preflight-optional
    repo_preflight_gate: bash tooling/gates/host_capability_preflight.sh document-conversion-system-binary
    host_management: operator-managed
    verification_mode: governed-host-binary-declaration
    verification_strategy: detect trusted soffice/libreoffice/unoconv before optional document conversion
    capability_status: host-managed-optional
    install_hint: install LibreOffice or unoconv on the host or runner image when office document conversion is required
    binary_names:
      - soffice
      - libreoffice
      - unoconv
  - id: ocr-capability-contract
    class: runtime-capability-contract
    role: runtime
    source: docs/architecture.md + docs/usage.md
    source_url: docs/usage.md#system-binary-governance
    pin_kind: capability-state
    pinned_value: unsupported
    checksum_or_digest: governance-declaration
    license: mixed
    owner: repo
    upgrade_cadence: on-demand
    verification_suite: upstream-governance-system-binary
    rollback_strategy: keep OCR disabled until a separately governed OCR upstream is introduced
    failure_domain: repo_config
    provenance_required: false
    floating_allowed: false
    assurance_tier: unsupported-declaration
    repo_preflight_gate: bash tooling/gates/host_capability_preflight.sh ocr-capability-contract
    verification_mode: governed-unsupported-capability-declaration
    verification_strategy: explicit governance declaration only; the current pipeline does not resolve or invoke an OCR engine
    capability_status: unsupported
    status_reason: OCR is intentionally not modeled as an active runtime dependency in the current pipeline
