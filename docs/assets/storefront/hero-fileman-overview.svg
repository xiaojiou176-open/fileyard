<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Fileman overview showing chaotic files flowing through manifest review into organized output">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fbfd" />
      <stop offset="100%" stop-color="#e6eef3" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eef5f8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#16212f" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#3a5d73" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect x="70" y="70" width="1460" height="760" rx="40" fill="#ffffff" opacity="0.68" />

  <g transform="translate(120 110)">
    <rect width="104" height="104" rx="24" fill="#16212f" />
    <path d="M26 34h52v11H26z" fill="#f2f5f7" />
    <path d="M26 52h37v11H26z" fill="#f2f5f7" opacity="0.88" />
    <path d="M26 70h25v11H26z" fill="#f2f5f7" opacity="0.75" />
    <circle cx="73" cy="74" r="10" fill="#8fd3b6" />
  </g>

  <text x="255" y="155" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" fill="#16212f">Fileman</text>
  <text x="255" y="215" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#385467">Manifest-driven, local-first file organization with safe review before apply.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="330" width="360" height="360" rx="30" fill="url(#panel)" stroke="#d4e3ea" stroke-width="2" />
    <rect x="640" y="300" width="360" height="420" rx="30" fill="url(#panel)" stroke="#d4e3ea" stroke-width="2" />
    <rect x="1120" y="330" width="360" height="360" rx="30" fill="url(#panel)" stroke="#d4e3ea" stroke-width="2" />
  </g>

  <text x="145" y="316" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="1.5" fill="#587387">MIXED INBOX</text>
  <text x="690" y="324" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="1.5" fill="#587387">MANIFEST REVIEW</text>
  <text x="1215" y="316" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="1.5" fill="#587387">ORGANIZED OUTPUT</text>

  <g transform="translate(150 370)">
    <rect x="0" y="0" width="118" height="84" rx="16" fill="#f7c66d" />
    <path d="M12 18h64l14 14h16v34a10 10 0 0 1-10 10H12a12 12 0 0 1-12-12V12A12 12 0 0 1 12 0z" fill="#ffd98f" />
    <text x="18" y="52" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#6d4c0f">photos</text>

    <rect x="148" y="38" width="122" height="84" rx="16" fill="#9cc0d8" />
    <path d="M18 58h86v12H18zM18 78h62v12H18z" transform="translate(148 0)" fill="#163447" opacity="0.84" />
    <text x="165" y="108" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0d2230">notes.pdf</text>

    <rect x="62" y="142" width="136" height="94" rx="16" fill="#f0a7a0" />
    <circle cx="98" cy="186" r="18" fill="#ffffff" opacity="0.9" />
    <path d="M133 186c20-20 32-28 45-10 9 12 14 22 24 10v28H74v-24c11-7 19-12 24-4z" fill="#fff4f3" />
    <text x="86" y="254" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#6e2c27">screen.png</text>

    <rect x="210" y="166" width="110" height="78" rx="16" fill="#b8d7c8" />
    <path d="M228 185h52v9h-52zM228 203h70v9h-70zM228 221h44v9h-44z" fill="#1f4d3a" opacity="0.88" />
    <text x="228" y="252" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#1f4d3a">audio.m4a</text>

    <text x="0" y="300" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#385467">Messy folders, screenshots, PDFs, and recordings</text>
  </g>

  <g transform="translate(670 344)">
    <rect x="0" y="0" width="300" height="62" rx="18" fill="#16212f" />
    <text x="24" y="40" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#f2f5f7">manifest.jsonl</text>
    <rect x="230" y="16" width="46" height="30" rx="15" fill="#8fd3b6" />
    <text x="241" y="37" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#163447">safe</text>

    <rect x="0" y="92" width="300" height="228" rx="22" fill="#ffffff" stroke="#d6e2e8" stroke-width="2" />
    <path d="M22 130h78v12H22zM22 160h42v12H22z" fill="#16212f" opacity="0.84" />
    <path d="M126 130h58v12H126zM126 160h70v12H126z" fill="#3a5d73" opacity="0.78" />
    <rect x="220" y="123" width="56" height="24" rx="12" fill="#e9f7f0" />
    <text x="232" y="140" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#1f4d3a">review</text>

    <path d="M22 202h78v12H22zM22 232h42v12H22z" fill="#16212f" opacity="0.84" />
    <path d="M126 202h84v12H126zM126 232h94v12H126z" fill="#3a5d73" opacity="0.78" />
    <rect x="220" y="195" width="56" height="24" rx="12" fill="#fff4dc" />
    <text x="231" y="212" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#7d5a13">dry-run</text>

    <path d="M22 274h78v12H22zM22 304h42v12H22z" fill="#16212f" opacity="0.84" />
    <path d="M126 274h96v12H126zM126 304h74v12H126z" fill="#3a5d73" opacity="0.78" />
    <rect x="220" y="267" width="56" height="24" rx="12" fill="#ecf2f6" />
    <text x="230" y="284" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#385467">apply</text>

    <rect x="0" y="344" width="300" height="42" rx="18" fill="#eef5f8" />
    <text x="20" y="371" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#385467">AI proposes the plan. You review before files move.</text>
  </g>

  <g transform="translate(1155 370)">
    <rect x="0" y="0" width="270" height="78" rx="20" fill="#16212f" />
    <text x="22" y="33" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#f2f5f7">organized/work</text>
    <path d="M22 48h90v8H22zM22 62h74v8H22z" fill="#8fd3b6" opacity="0.95" />

    <rect x="34" y="120" width="230" height="68" rx="18" fill="#eef5f8" stroke="#cfe0e8" stroke-width="2" />
    <text x="58" y="148" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#163447">2026-03 receipts</text>
    <text x="58" y="172" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#45657c">tagged, renamed, traced</text>

    <rect x="72" y="218" width="196" height="78" rx="18" fill="#eef8f3" stroke="#c9e5d8" stroke-width="2" />
    <text x="96" y="248" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f4d3a">travel / camera-roll</text>
    <text x="96" y="272" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#2f5f4f">reversible, grouped, predictable</text>

    <rect x="0" y="330" width="270" height="42" rx="18" fill="#f7fbfd" />
    <text x="16" y="357" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#385467">Safer moves, cleaner folders, easy rollback.</text>
  </g>

  <path d="M500 510C560 510 578 510 620 510" fill="none" stroke="#3a5d73" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M1020 510C1065 510 1086 510 1110 510" fill="none" stroke="#3a5d73" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)" />

  <rect x="120" y="760" width="1360" height="70" rx="24" fill="#16212f" opacity="0.94" />
  <text x="160" y="804" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#f2f5f7">Local-first workflow: inspect the intake, review the manifest, then apply or roll back deterministic file actions.</text>
</svg>
