services:
  movi-ci:
    image: ${MOVI_CI_IMAGE:-movi-ci:local}
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - movi_venv:/root/.cache/fileyard/venv/default
      - movi_playwright:/root/.cache/fileyard/playwright
      - movi_webui_node_modules:/workspace/apps/webui/node_modules
    environment:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      MOVI_IN_CONTAINER: "1"
      MOVI_ALLOW_HOST_EXECUTION: "0"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      MOVI_LIVE_TEST_URL: ${MOVI_LIVE_TEST_URL:-}
      MOVI_ROLLBACK_HMAC_KEY: ${MOVI_ROLLBACK_HMAC_KEY:-}
      MOVI_TRACE_ID: ${MOVI_TRACE_ID:-}
      MOVI_SESSION_ID: ${MOVI_SESSION_ID:-}
      MOVI_REQUEST_ID: ${MOVI_REQUEST_ID:-}
      MOVI_USER_ID: ${MOVI_USER_ID:-}
      TZ: "America/Los_Angeles"
    tty: true

  movi-web-api:
    image: ${MOVI_CI_IMAGE:-movi-ci:local}
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - movi_venv:/root/.cache/fileyard/venv/default
      - movi_webui_node_modules:/workspace/apps/webui/node_modules
    environment:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      MOVI_IN_CONTAINER: "1"
      MOVI_ALLOW_HOST_EXECUTION: "0"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      MOVI_ROLLBACK_HMAC_KEY: ${MOVI_ROLLBACK_HMAC_KEY:-}
      MOVI_WEB_API_HOST: ${MOVI_WEB_API_HOST:-0.0.0.0}
      MOVI_WEB_API_PORT: ${MOVI_WEB_API_PORT:-18080}
      MOVI_WEBUI_HOST: ${MOVI_WEBUI_HOST:-0.0.0.0}
      MOVI_WEBUI_PORT: ${MOVI_WEBUI_PORT:-5173}
      TZ: "America/Los_Angeles"
    command: ["bash", "tooling/runtime/run_web_api.sh", "--host", "0.0.0.0", "--port", "18080"]
    ports:
      - "${MOVI_WEB_API_PORT:-18080}:18080"
      - "${MOVI_WEBUI_PORT:-5173}:5173"
    tty: true

  movi-webui:
    image: ${MOVI_CI_IMAGE:-movi-ci:local}
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - movi_webui_node_modules:/workspace/apps/webui/node_modules
    environment:
      MOVI_IN_CONTAINER: "1"
      MOVI_ALLOW_HOST_EXECUTION: "0"
      MOVI_WEBUI_HOST: ${MOVI_WEBUI_HOST:-0.0.0.0}
      MOVI_WEBUI_PORT: ${MOVI_WEBUI_PORT:-5173}
      TZ: "America/Los_Angeles"
    command: ["bash", "tooling/runtime/run_webui.sh", "--host", "0.0.0.0", "--port", "5173"]
    depends_on:
      - movi-web-api
    network_mode: "service:movi-web-api"
    tty: true

volumes:
  movi_venv:
  movi_playwright:
  movi_webui_node_modules:
